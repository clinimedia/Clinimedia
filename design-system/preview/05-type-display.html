<!doctype html>
<html><head><meta charset="utf-8"><title>Display Type</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:28px; background:#fff; }
  .display { font-size: 88px; line-height:1.02; letter-spacing:-0.025em; font-weight:700; color: var(--fg-1); }
  .h1 { font-size: 56px; line-height:1.05; letter-spacing:-0.02em; font-weight:700; color: var(--fg-1); margin-top:14px; }
  .meta { display:flex; gap:14px; margin-top:14px; font-family: var(--font-mono); font-size:11px; color: var(--fg-3); }
  .meta span { padding:3px 8px; background: var(--cm-slate-50); border-radius:6px; }
</style>
</head><body>
  <div class="display">Grow your clinic.</div>
  <div class="h1">From media day to ad campaigns — done.</div>
  <div class="meta"><span>Inter 700</span><span>Display · clamp 56–100</span><span>tracking -0.025em</span><span>leading 1.02</span></div>
</body></html>
