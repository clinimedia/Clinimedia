<!doctype html>
<html><head><meta charset="utf-8"><title>Brand Colors — Slate</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px; background:#fff; font-family: var(--font-sans); }
  .row { display:grid; grid-template-columns: repeat(7, 1fr); gap:10px; }
  .sw { border-radius:10px; overflow:hidden; box-shadow: var(--shadow-xs); }
  .sw .chip { height:80px; }
  .sw .meta { padding:10px 12px; background:#fff; }
  .sw .name { font-size:12px; font-weight:600; color: var(--fg-1); }
  .sw .hex  { font-family: var(--font-mono); font-size:11px; color: var(--fg-3); margin-top:2px; }
</style>
</head><body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#1F2A33"></div><div class="meta"><div class="name">Slate 900</div><div class="hex">#1F2A33</div></div></div>
    <div class="sw"><div class="chip" style="background:#2A3743"></div><div class="meta"><div class="name">Slate 800</div><div class="hex">#2A3743</div></div></div>
    <div class="sw"><div class="chip" style="background:#3A4954"></div><div class="meta"><div class="name">Slate 700</div><div class="hex">#3A4954</div></div></div>
    <div class="sw"><div class="chip" style="background:#5C6B77"></div><div class="meta"><div class="name">Slate 500</div><div class="hex">#5C6B77</div></div></div>
    <div class="sw"><div class="chip" style="background:#A5B0BA"></div><div class="meta"><div class="name">Slate 300</div><div class="hex">#A5B0BA</div></div></div>
    <div class="sw"><div class="chip" style="background:#E5E9ED"></div><div class="meta"><div class="name">Slate 100</div><div class="hex">#E5E9ED</div></div></div>
    <div class="sw"><div class="chip" style="background:#F4F6F8"></div><div class="meta"><div class="name">Slate 50</div><div class="hex">#F4F6F8</div></div></div>
  </div>
</body></html>
