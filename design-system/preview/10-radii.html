<!doctype html>
<html><head><meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:22px; background:#fff; font-family: var(--font-sans); display:grid; grid-template-columns: repeat(6, 1fr); gap:12px; }
  .swatch { background: var(--cm-sky-200); aspect-ratio:1; display:flex; align-items:flex-end; justify-content:center; padding:10px; }
  .swatch span { font-family: var(--font-mono); font-size:11px; color: var(--cm-slate-900); background:#fff; padding:3px 7px; border-radius:4px; }
</style>
</head><body>
  <div class="swatch" style="border-radius:4px"><span>4 · xs</span></div>
  <div class="swatch" style="border-radius:8px"><span>8 · sm</span></div>
  <div class="swatch" style="border-radius:12px"><span>12 · md</span></div>
  <div class="swatch" style="border-radius:20px"><span>20 · lg</span></div>
  <div class="swatch" style="border-radius:28px"><span>28 · xl</span></div>
  <div class="swatch" style="border-radius:999px"><span>pill</span></div>
</body></html>
