<!doctype html>
<html><head><meta charset="utf-8"><title>Type Weights</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:22px; background:#fff; font-family: var(--font-sans); display:grid; grid-template-columns: repeat(3, 1fr); gap:14px; }
  .w { padding:14px 16px; background: var(--cm-slate-50); border-radius:10px; }
  .w .name { font-family: var(--font-mono); font-size:11px; color: var(--fg-3); margin-bottom:6px; }
  .w .sample { font-size:22px; color: var(--fg-1); letter-spacing:-0.01em; }
  .w-300 .sample { font-weight:300; }
  .w-400 .sample { font-weight:400; }
  .w-500 .sample { font-weight:500; }
  .w-600 .sample { font-weight:600; }
  .w-700 .sample { font-weight:700; }
  .w-800 .sample { font-weight:800; }
</style>
</head><body>
  <div class="w w-300"><div class="name">light · 300</div><div class="sample">CliniMedia</div></div>
  <div class="w w-400"><div class="name">regular · 400</div><div class="sample">CliniMedia</div></div>
  <div class="w w-500"><div class="name">medium · 500</div><div class="sample">CliniMedia</div></div>
  <div class="w w-600"><div class="name">semibold · 600</div><div class="sample">CliniMedia</div></div>
  <div class="w w-700"><div class="name">bold · 700</div><div class="sample">CliniMedia</div></div>
  <div class="w w-800"><div class="name">xbold · 800</div><div class="sample">CliniMedia</div></div>
</body></html>
