<!doctype html>
<html><head><meta charset="utf-8"><title>Badges &amp; Tags</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:22px; background:#fff; font-family: var(--font-sans); display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
  .badge { font-size:12px; font-weight:600; padding:5px 12px; border-radius:999px; letter-spacing:0.02em; display:inline-flex; align-items:center; gap:6px; }
  .neutral { background: var(--cm-slate-50); color: var(--fg-2); }
  .accent  { background: var(--cm-sky-200); color: var(--cm-sky-700); }
  .dark    { background: var(--cm-slate-900); color: #fff; }
  .success { background:#EAF7F0; color:#2EA66B; }
  .warn    { background:#FCF4E5; color:#A36B14; }
  .outline { background: transparent; color: var(--fg-2); border:1px solid var(--border-default); }
  .dot     { width:6px; height:6px; border-radius:999px; background: currentColor; }
</style>
</head><body>
  <span class="badge neutral">Marketing</span>
  <span class="badge accent">SEO</span>
  <span class="badge dark">New</span>
  <span class="badge success"><span class="dot"></span>Live campaign</span>
  <span class="badge warn">Needs review</span>
  <span class="badge outline">Toronto, ON</span>
</body></html>
