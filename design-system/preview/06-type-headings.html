<!doctype html>
<html><head><meta charset="utf-8"><title>Heading Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:#fff; font-family: var(--font-sans); }
  .row { display:flex; align-items:baseline; gap:18px; padding:8px 0; border-bottom:1px solid var(--border-hairline); }
  .row:last-child { border:0; }
  .row .label { font-family: var(--font-mono); font-size:11px; color: var(--fg-3); width:48px; flex:none; }
  .h1 { font-size:44px; font-weight:700; letter-spacing:-0.02em; line-height:1.1; color: var(--fg-1); }
  .h2 { font-size:32px; font-weight:700; letter-spacing:-0.015em; color: var(--fg-1); }
  .h3 { font-size:24px; font-weight:600; letter-spacing:-0.01em; color: var(--fg-1); }
  .h4 { font-size:20px; font-weight:600; color: var(--fg-1); }
  .h5 { font-size:18px; font-weight:600; color: var(--fg-1); }
  .h6 { font-size:16px; font-weight:600; color: var(--fg-1); }
</style>
</head><body>
  <div class="row"><div class="label">H1 / 44</div><div class="h1">Helping clinics grow.</div></div>
  <div class="row"><div class="label">H2 / 32</div><div class="h2">Built for dental and medical clinics.</div></div>
  <div class="row"><div class="label">H3 / 24</div><div class="h3">What we offer</div></div>
  <div class="row"><div class="label">H4 / 20</div><div class="h4">Content &amp; Media Creation</div></div>
  <div class="row"><div class="label">H5 / 18</div><div class="h5">Section subtitle</div></div>
  <div class="row"><div class="label">H6 / 16</div><div class="h6">Smallest heading</div></div>
</body></html>
