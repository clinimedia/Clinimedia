<!doctype html>
<html><head><meta charset="utf-8"><title>Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:22px; background:#fff; font-family: var(--font-sans); display:flex; flex-wrap:wrap; gap:12px; align-items:center; }
  .btn { font-family: inherit; font-size:15px; font-weight:600; letter-spacing:-0.005em; padding:12px 22px; border-radius:999px; border:0; cursor:pointer; transition: all 200ms cubic-bezier(0.22,1,0.36,1); display:inline-flex; align-items:center; gap:8px; }
  .btn.primary { background: var(--cm-slate-900); color: #fff; }
  .btn.primary:hover { background: var(--cm-slate-700); transform: translateY(-1px); box-shadow: 0 8px 24px rgba(31,42,51,0.18); }
  .btn.secondary { background: transparent; color: var(--cm-slate-900); border:1.5px solid var(--cm-slate-900); }
  .btn.secondary:hover { background: var(--cm-slate-900); color:#fff; }
  .btn.accent { background: var(--cm-sky-600); color:#fff; }
  .btn.accent:hover { background: var(--cm-sky-700); }
  .btn.link { background:none; color: var(--cm-sky-700); padding:12px 4px; }
  .btn.link:hover { color: var(--cm-slate-900); }
  .btn.small { font-size:13px; padding:8px 16px; }
  .arrow { width:14px; height:14px; }
</style>
</head><body>
  <button class="btn primary">Start today <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M5 12h14M13 6l6 6-6 6"/></svg></button>
  <button class="btn secondary">Learn more</button>
  <button class="btn accent">Get started</button>
  <button class="btn link">Read more →</button>
  <button class="btn primary small">Small</button>
  <button class="btn secondary small">Small</button>
</body></html>
