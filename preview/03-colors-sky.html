<!doctype html>
<html><head><meta charset="utf-8"><title>Brand Colors — Sky</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px; background:#fff; font-family: var(--font-sans); }
  .row { display:grid; grid-template-columns: repeat(6, 1fr); gap:10px; }
  .sw { border-radius:10px; overflow:hidden; box-shadow: var(--shadow-xs); }
  .sw .chip { height:80px; }
  .sw .meta { padding:10px 12px; background:#fff; }
  .sw .name { font-size:12px; font-weight:600; color: var(--fg-1); }
  .sw .hex  { font-family: var(--font-mono); font-size:11px; color: var(--fg-3); margin-top:2px; }
</style>
</head><body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#4A8AA3"></div><div class="meta"><div class="name">Sky 700</div><div class="hex">#4A8AA3</div></div></div>
    <div class="sw"><div class="chip" style="background:#6BA3BB"></div><div class="meta"><div class="name">Sky 600 · accent</div><div class="hex">#6BA3BB</div></div></div>
    <div class="sw"><div class="chip" style="background:#8FBCD0"></div><div class="meta"><div class="name">Sky 500</div><div class="hex">#8FBCD0</div></div></div>
    <div class="sw"><div class="chip" style="background:#B5D2E0"></div><div class="meta"><div class="name">Sky 400</div><div class="hex">#B5D2E0</div></div></div>
    <div class="sw"><div class="chip" style="background:#D9E8EF"></div><div class="meta"><div class="name">Sky 200</div><div class="hex">#D9E8EF</div></div></div>
    <div class="sw"><div class="chip" style="background:#EEF5F8"></div><div class="meta"><div class="name">Sky 50</div><div class="hex">#EEF5F8</div></div></div>
  </div>
</body></html>
