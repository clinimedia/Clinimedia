<!doctype html>
<html><head><meta charset="utf-8"><title>Nav</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:0; background:#F4F6F8; font-family: var(--font-sans); }
  nav { display:flex; align-items:center; justify-content:space-between; padding:14px 28px; background: rgba(255,255,255,0.85); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border-hairline); }
  .logo img { height:28px; display:block; }
  .links { display:flex; gap:28px; }
  .links a { font-size:14px; font-weight:500; color: var(--fg-1); }
  .links a:hover { color: var(--cm-sky-700); }
  .cta { display:flex; gap:8px; }
  .cta .btn { font-size:13px; font-weight:600; padding:8px 16px; border-radius:999px; }
  .cta .ghost { color: var(--fg-1); background:transparent; }
  .cta .solid { background: var(--cm-slate-900); color:#fff; }
</style>
</head><body>
  <nav>
    <div class="logo"><img src="../assets/clinimedia-logo.png" alt="CliniMedia"></div>
    <div class="links"><a>Our work</a><a>Services</a><a>Portfolio</a></div>
    <div class="cta"><a class="btn ghost">Portal login</a><a class="btn solid">Contact</a></div>
  </nav>
</body></html>
