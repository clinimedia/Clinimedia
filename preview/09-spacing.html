<!doctype html>
<html><head><meta charset="utf-8"><title>Spacing Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:22px; background:#fff; font-family: var(--font-sans); }
  .row { display:flex; align-items:center; gap:12px; padding:6px 0; }
  .label { font-family: var(--font-mono); font-size:11px; color: var(--fg-3); width:46px; flex:none; }
  .bar { background: var(--cm-sky-400); height:14px; border-radius:3px; }
  .px { font-family: var(--font-mono); font-size:11px; color: var(--fg-3); margin-left:8px; }
</style>
</head><body>
  <div class="row"><div class="label">sp-4</div><div class="bar" style="width:4px"></div><div class="px">4px</div></div>
  <div class="row"><div class="label">sp-8</div><div class="bar" style="width:8px"></div><div class="px">8px</div></div>
  <div class="row"><div class="label">sp-12</div><div class="bar" style="width:12px"></div><div class="px">12px</div></div>
  <div class="row"><div class="label">sp-16</div><div class="bar" style="width:16px"></div><div class="px">16px</div></div>
  <div class="row"><div class="label">sp-24</div><div class="bar" style="width:24px"></div><div class="px">24px</div></div>
  <div class="row"><div class="label">sp-32</div><div class="bar" style="width:32px"></div><div class="px">32px</div></div>
  <div class="row"><div class="label">sp-48</div><div class="bar" style="width:48px"></div><div class="px">48px</div></div>
  <div class="row"><div class="label">sp-64</div><div class="bar" style="width:64px"></div><div class="px">64px</div></div>
  <div class="row"><div class="label">sp-96</div><div class="bar" style="width:96px"></div><div class="px">96px</div></div>
  <div class="row"><div class="label">sp-144</div><div class="bar" style="width:144px"></div><div class="px">144px · section gap</div></div>
</body></html>
