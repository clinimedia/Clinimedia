<!doctype html>
<html><head><meta charset="utf-8"><title>Service Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:22px; background:#F4F6F8; font-family: var(--font-sans); display:grid; grid-template-columns: 1fr 1fr; gap:18px; }
  .card { background:#fff; border-radius:16px; padding:22px; box-shadow: 0 8px 24px rgba(31,42,51,0.08), 0 2px 6px rgba(31,42,51,0.04); }
  .ico { width:40px; height:40px; border-radius:12px; background: var(--cm-sky-200); color: var(--cm-sky-700); display:flex; align-items:center; justify-content:center; margin-bottom:14px; }
  .title { font-size:18px; font-weight:600; color: var(--fg-1); margin-bottom:6px; letter-spacing:-0.01em; }
  .body { font-size:14px; line-height:1.55; color: var(--fg-2); }
</style>
</head><body>
  <div class="card">
    <div class="ico"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="12" cy="12" r="3"/></svg></div>
    <div class="title">Content &amp; Media Days</div>
    <div class="body">A pro crew shows up monthly for team photos, office shots, and seasonal themes — ready for social, ads, and your site.</div>
  </div>
  <div class="card">
    <div class="ico"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M7 14l4-4 4 4 5-5"/></svg></div>
    <div class="title">Meta &amp; Google Ads</div>
    <div class="body">Campaign setup, creative, budget control, performance tracking — we get the most out of every dollar.</div>
  </div>
</body></html>
