<!doctype html>
<html><head><meta charset="utf-8"><title>Iconography</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:22px; background:#fff; font-family: var(--font-sans); display:grid; grid-template-columns: repeat(8, 1fr); gap:8px; }
  .ico { aspect-ratio:1; display:flex; align-items:center; justify-content:center; background: var(--cm-slate-50); border-radius:10px; color: var(--cm-slate-700); }
  .ico svg { width:22px; height:22px; }
  .label { font-family: var(--font-mono); font-size:9px; color: var(--fg-3); text-align:center; margin-top:4px; }
  .cell { display:flex; flex-direction:column; }
</style>
