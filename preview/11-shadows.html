<!doctype html>
<html><head><meta charset="utf-8"><title>Shadows</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:32px; background:#F4F6F8; font-family: var(--font-sans); display:grid; grid-template-columns: repeat(4, 1fr); gap:24px; }
  .card { background:#fff; border-radius:12px; height:80px; display:flex; align-items:center; justify-content:center; font-family: var(--font-mono); font-size:11px; color: var(--fg-3); }
  .s-xs { box-shadow: 0 1px 2px rgba(31,42,51,0.05); }
  .s-sm { box-shadow: 0 2px 6px rgba(31,42,51,0.06), 0 1px 2px rgba(31,42,51,0.04); }
  .s-md { box-shadow: 0 8px 24px rgba(31,42,51,0.08), 0 2px 6px rgba(31,42,51,0.04); }
  .s-lg { box-shadow: 0 24px 48px rgba(31,42,51,0.10), 0 4px 12px rgba(31,42,51,0.05); }
</style>
</head><body>
  <div class="card s-xs">shadow-xs</div>
  <div class="card s-sm">shadow-sm</div>
  <div class="card s-md">shadow-md · default card</div>
  <div class="card s-lg">shadow-lg · hover lift</div>
</body></html>
