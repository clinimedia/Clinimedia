<!doctype html>
<html><head><meta charset="utf-8"><title>Brand Logo</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:#fff; display:flex; gap:24px; align-items:center; }
  .lockup { flex:1; display:flex; align-items:center; justify-content:center; background:#fff; border:1px solid var(--border-hairline); border-radius:12px; padding:24px; height:100px;}
  .lockup.dark { background: var(--cm-slate-900); }
  .lockup img { max-height:48px; width:auto; display:block; }
  .icon-only { flex: 0 0 100px; height:100px; display:flex; align-items:center; justify-content:center; background: var(--cm-sky-50); border-radius:12px; }
  .icon-only img { width:64px; height:64px; }
</style>
</head><body>
  <div class="icon-only"><img src="../assets/clinimedia-icon.png" alt=""></div>
  <div class="lockup"><img src="../assets/clinimedia-logo.png" alt="CliniMedia"></div>
  <div class="lockup dark"><img src="../assets/clinimedia-logo.png" alt="CliniMedia" style="filter: brightness(0) invert(1) opacity(.95)"></div>
</body></html>
